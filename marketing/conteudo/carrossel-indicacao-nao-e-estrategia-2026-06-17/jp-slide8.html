<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><style>
  @import url('_fonts.css');
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');
  @import url('jp-base.css');
  .cena{ background-image:url('capa-jp-s8.png'); }
  /* manchete centralizada no meio, branca */
  .meio{ position:absolute; z-index:3; left:50%; top:47%; transform:translate(-50%,-50%); width:820px; text-align:center; }
  .meio .l{ color:#fff; text-shadow:0 3px 16px rgba(6,4,12,.9), 0 2px 5px rgba(6,4,12,.85); }
  .meio .l .ac{ color:#fff; }
  .meio .hero{ color:#fff; text-shadow:0 5px 22px rgba(6,4,12,.92), 0 2px 5px rgba(6,4,12,.85); }
  .meio .hero .ac{ color:#fff; }
  /* CTA na base, branco */
  .cta{ position:absolute; z-index:3; left:50%; bottom:104px; transform:translateX(-50%); width:840px; text-align:center; }
  .cta .corpo{ margin-top:0; font-size:28px; color:#fff; text-shadow:0 3px 14px rgba(6,4,12,.9), 0 1px 3px rgba(6,4,12,.85); }
  .cta .corpo b{ color:#fff; }
  .btn{ display:inline-block; margin-top:24px; background:var(--roxo); color:#fff; font-weight:700; font-size:24px;
    letter-spacing:.02em; padding:18px 40px; border-radius:48px; box-shadow:0 12px 34px rgba(105,42,191,.55); }
  .arroba{ margin-top:18px; font-family:'Montserrat',sans-serif; font-weight:600; font-size:22px; letter-spacing:.05em;
    color:#fff; text-shadow:0 2px 12px rgba(6,4,12,.9); }
</style></head>
<body><div class="wrap"><section class="slide">
  <div class="cena"></div><div class="tex"></div><div class="grain"></div><div class="escuro"></div>
  <div class="meio">
    <div class="l">cansou de <span class="ac">viver</span></div>
    <div class="hero">na <span class="ac">sorte</span>?</div>
  </div>
  <div class="cta">
    <div class="corpo">Vem montar com a Focus o canal de vendas que <b>não depende de ninguém lembrar de você</b>.</div>
    <div class="btn">QUERO MEU CANAL &rarr;</div>
    <div class="arroba">@focusprogress</div>
  </div>
  <div class="topo"><img src="../../../identidade/logo-simbolo-branco.png" alt=""><div class="pill-v"></div></div>
  <div class="dots"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i class="on"></i></div>
</section></div></body></html>
