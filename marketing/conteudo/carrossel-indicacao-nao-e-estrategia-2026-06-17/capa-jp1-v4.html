<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  @import url('_fonts.css');
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap');
  *{ margin:0; padding:0; box-sizing:border-box; }
  :root{ --roxo:#692ABF; --tinta:#15101c; }
  html,body{ font-family:'Montserrat',sans-serif; background:#000; }
  .wrap{ display:flex; justify-content:center; padding:20px 0; }
  .slide{ width:1080px; height:1350px; position:relative; overflow:hidden; background:#ece7dd; }
  .cena{ position:absolute; inset:0; z-index:0; background:url('capa-jp-samurai.png') center/cover no-repeat; }
  /* leve clareada de osso no topo (igual a 1a versao) */
  .topscrim{ position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(236,231,221,.82) 0%, rgba(236,231,221,.5) 12%, rgba(236,231,221,.12) 22%, transparent 30%); }

  /* 1a versao + texto MAIOR + sombra projetada atras do texto */
  .kick{ position:absolute; z-index:3; left:0; right:0; top:96px; text-align:center;
    font-family:'Montserrat',sans-serif; font-weight:600; font-size:23px; letter-spacing:.40em;
    text-transform:uppercase; color:rgba(30,22,40,.76); text-shadow:0 3px 12px rgba(10,6,18,.4); }
  .setup{ position:absolute; z-index:3; left:0; right:0; top:136px; text-align:center;
    font-family:'Montserrat',sans-serif; font-weight:500; font-size:64px; color:var(--tinta);
    text-shadow:0 6px 20px rgba(10,6,18,.5), 0 2px 5px rgba(10,6,18,.42); }
  .setup .ac{ font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:78px;
    color:var(--roxo); text-shadow:0 6px 20px rgba(10,6,18,.5), 0 2px 5px rgba(10,6,18,.42); }
  .hero{ position:absolute; z-index:3; left:0; right:0; top:206px; text-align:center;
    font-family:'Archivo Black',sans-serif; font-size:124px; line-height:.9; letter-spacing:-.035em;
    color:var(--tinta); text-shadow:0 8px 26px rgba(10,6,18,.55), 0 3px 6px rgba(10,6,18,.45); }

  .topo{ position:absolute; z-index:6; top:52px; left:80px; right:80px; display:flex; justify-content:space-between; align-items:flex-start; }
  .topo img{ height:60px; }
  .pill-v{ width:16px; height:50px; border:2px solid rgba(105,42,191,.85); border-radius:12px; }
  .arrasta{ position:absolute; z-index:6; left:50%; transform:translateX(-50%); bottom:58px;
    border:1.5px solid rgba(255,255,255,.55); border-radius:40px; padding:11px 24px;
    font-family:'Montserrat',sans-serif; font-size:15px; font-weight:600; letter-spacing:.15em; color:#fff; text-transform:uppercase; text-shadow:0 2px 10px #000; }
</style>
</head>
<body>
<div class="wrap">
  <section class="slide">
    <div class="cena"></div>
    <div class="topscrim"></div>
    <div class="kick">Pra quem vive de indicação</div>
    <div class="setup">indicação <span class="ac">não</span> é</div>
    <div class="hero">estratégia</div>
    <div class="topo">
      <img src="../../../identidade/logo-simbolo-roxo.png" alt="">
      <div class="pill-v"></div>
    </div>
    <div class="arrasta">Arrasta &rarr;</div>
  </section>
</div>
</body>
</html>
